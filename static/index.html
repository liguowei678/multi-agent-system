<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Agent Dashboard</title>
<style>
/* ── Reset & Variables ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0b0d14;       --bg-secondary:#131620;
  --bg-tertiary:#1a1e2b;      --bg-elevated:#212636;
  --bg-input:#161923;         --border:#252a38;
  --border-light:#2e3344;     --text-primary:#e2e6f2;
  --text-secondary:#9399ab;   --text-muted:#5a5f73;
  --scrollbar-thumb:#2a2f3f;  --scrollbar-track:transparent;

  --supervisor:#6366f1;       --researcher:#06b6d4;
  --analyst:#f59e0b;          --coder:#10b981;
  --reviewer:#ec4899;         --tool:#8b5cf6;
  --success:#10b981;          --warning:#f59e0b;
  --error:#ef4444;            --info:#3b82f6;
  --score-5:#10b981;          --score-4:#34d399;
  --score-3:#f59e0b;          --score-2:#f97316;
  --score-1:#ef4444;

  --agent-colors: {
    supervisor: var(--supervisor);
    researcher: var(--researcher);
    analyst: var(--analyst);
    coder: var(--coder);
    reviewer: var(--reviewer);
    tool_executor: var(--tool);
  };

  --radius-sm:6px;            --radius:10px;
  --radius-lg:14px;           --shadow:0 2px 12px rgba(0,0,0,.3);
  --transition:180ms ease;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'JetBrains Mono','Cascadia Code',Consolas,monospace;
}

html,body{height:100%;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);font-size:14px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3f52}

/* ── Layout ────────────────────────────────────────────────────────────── */
#app{display:grid;grid-template-columns:260px 1fr 380px;height:100vh;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────────────────────── */
.sidebar{
  background:var(--bg-secondary); border-right:1px solid var(--border);
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
}
.sidebar-header{
  padding:20px 18px 14px; border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo{width:32px;height:32px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--supervisor),var(--researcher));
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;
}
.sidebar-title{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.sidebar-status{width:7px;height:7px;border-radius:50%;background:var(--success);margin-left:auto;box-shadow:0 0 6px var(--success)}
.sidebar-actions{padding:12px 14px}
.btn-new{
  width:100%;padding:10px 14px;background:var(--bg-tertiary);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text-primary);font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:8px;transition:all var(--transition);
  font-family:var(--font);
}
.btn-new:hover{background:var(--bg-elevated);border-color:var(--border-light)}
.btn-new svg{width:16px;height:16px;opacity:.7}
.sessions-list{flex:1;overflow-y:auto;padding:4px 8px}
.session-item{
  padding:10px 12px;margin:2px 0;border-radius:var(--radius-sm);cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:all var(--transition);
  position:relative;
}
.session-item:hover{background:var(--bg-tertiary)}
.session-item.active{background:var(--bg-elevated);border:1px solid var(--border-light)}
.session-info{flex:1;min-width:0}
.session-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.btn-delete-session{
  opacity:0;width:26px;height:26px;border-radius:var(--radius-sm);border:none;
  background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all var(--transition);
}
.session-item:hover .btn-delete-session{opacity:1}
.btn-delete-session:hover{background:rgba(239,68,68,.15);color:var(--error)}

/* ── Chat Panel ────────────────────────────────────────────────────────── */
.chat-panel{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg-primary)}
.chat-header{
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;background:var(--bg-primary);
}
.chat-header .session-label{font-weight:600;font-size:14px}
.badge{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;
  letter-spacing:0.02em;text-transform:uppercase;
}
.badge-simple{background:rgba(16,185,129,.12);color:var(--success)}
.badge-complex{background:rgba(99,102,241,.12);color:var(--supervisor)}
.badge-iterations{background:var(--bg-tertiary);color:var(--text-secondary)}
.btn-toggle-detail{
  margin-left:auto;padding:6px 12px;background:var(--bg-tertiary);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-secondary);font-size:12px;
  cursor:pointer;transition:all var(--transition);font-family:var(--font);
}
.btn-toggle-detail:hover{background:var(--bg-elevated);color:var(--text-primary)}

/* Messages */
.messages-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:6px}

.message{display:flex;gap:10px;max-width:85%;animation:msgIn .2s ease}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message.agent,.message.tool{align-self:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-avatar{
  width:32px;height:32px;border-radius:var(--radius-sm);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
}
.msg-avatar.user-avatar{background:var(--bg-elevated);color:var(--text-secondary)}
.msg-avatar.agent-supervisor{background:var(--supervisor)}
.msg-avatar.agent-researcher{background:var(--researcher)}
.msg-avatar.agent-analyst{background:var(--analyst)}
.msg-avatar.agent-coder{background:var(--coder)}
.msg-avatar.agent-reviewer{background:var(--reviewer)}
.msg-avatar.agent-tool_executor{background:var(--tool)}

.msg-bubble{
  padding:10px 14px;border-radius:var(--radius);font-size:13.5px;
  line-height:1.6;word-break:break-word;position:relative;
}
.message.user .msg-bubble{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary)}
.message.agent .msg-bubble{
  background:var(--bg-secondary);border:1px solid var(--border);
  border-left:3px solid var(--border-light);
}
.message.agent[data-agent="supervisor"] .msg-bubble{border-left-color:var(--supervisor)}
.message.agent[data-agent="researcher"] .msg-bubble{border-left-color:var(--researcher)}
.message.agent[data-agent="analyst"] .msg-bubble{border-left-color:var(--analyst)}
.message.agent[data-agent="coder"] .msg-bubble{border-left-color:var(--coder)}
.message.agent[data-agent="reviewer"] .msg-bubble{border-left-color:var(--reviewer)}
.message.agent[data-agent="tool_executor"] .msg-bubble{border-left-color:var(--tool)}

.msg-agent-label{
  font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  margin-bottom:4px;
}
.msg-content{white-space:pre-wrap}
.msg-content pre{
  margin:8px 0;padding:12px;background:var(--bg-primary);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-family:var(--mono);font-size:12px;
  overflow-x:auto;max-height:300px;overflow-y:auto;
}
.msg-content code{font-family:var(--mono);font-size:12.5px;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:3px}

/* Tool Call Card */
.tool-card{
  background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);
  margin:4px 0;overflow:hidden;max-width:85%;align-self:flex-start;
}
.tool-card-header{
  padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;
  user-select:none;font-size:12.5px;font-weight:500;color:var(--text-secondary);
  transition:background var(--transition);
}
.tool-card-header:hover{background:var(--bg-elevated)}
.tool-card-icon{width:18px;height:18px;border-radius:4px;
  background:rgba(139,92,246,.15);color:var(--tool);
  display:flex;align-items:center;justify-content:center;font-size:10px;
}
.tool-card-name{font-weight:600;color:var(--tool);font-family:var(--mono);font-size:12px}
.tool-card-chevron{margin-left:auto;transition:transform var(--transition);opacity:.5;font-size:11px}
.tool-card.expanded .tool-card-chevron{transform:rotate(180deg)}
.tool-card-body{display:none;padding:0 14px 12px;font-size:12.5px}
.tool-card.expanded .tool-card-body{display:block}
.tool-card-section{margin-top:8px}
.tool-card-section-label{
  font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-muted);margin-bottom:4px;
}
.tool-card-section pre{
  background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px;font-family:var(--mono);font-size:11.5px;max-height:200px;
  overflow:auto;white-space:pre-wrap;word-break:break-all;
}
.tool-status{font-size:11px;display:flex;align-items:center;gap:4px}
.tool-status.success{color:var(--success)}
.tool-status.error{color:var(--error)}

/* Agent Progress Bar (mini, collapsible, in-chat-flow) */
.agent-progress{
  background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);
  max-width:85%;align-self:flex-start;overflow:hidden;margin:4px 0;
  animation:msgIn .2s ease;
}
.agent-progress.completed{
  border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.04);
  opacity:.85;
}
.agent-progress.completed .ap-header{cursor:pointer}
.agent-progress.completed .ap-dot{background:var(--success)}
.ap-header{
  padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;
  user-select:none;font-size:12.5px;color:var(--text-secondary);
  transition:background var(--transition);
}
.ap-header:hover{background:var(--bg-tertiary)}
.ap-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--text-muted);transition:background var(--transition);
}
.ap-dot.active{box-shadow:0 0 8px currentColor}
.ap-label{flex:1;font-size:12px}
.ap-step{font-weight:600}
.ap-chevron{font-size:10px;opacity:.5;transition:transform var(--transition)}
.agent-progress.expanded .ap-chevron{transform:rotate(180deg)}
.ap-body{display:none;padding:0 14px 10px}
.agent-progress.expanded .ap-body{display:block}
.ap-timeline{position:relative;padding-left:16px}
.ap-timeline::before{
  content:'';position:absolute;left:3px;top:2px;bottom:2px;
  width:1.5px;background:var(--border);border-radius:1px;
}
.ap-node{
  position:relative;padding:3px 0 3px 14px;font-size:11.5px;
  color:var(--text-muted);display:flex;align-items:center;gap:6px;
}
.ap-node:last-child{padding-bottom:0}
.ap-node::before{
  content:'';position:absolute;left:-14px;top:7px;
  width:7px;height:7px;border-radius:50%;background:var(--bg-secondary);
  border:1.5px solid var(--border);
}
.ap-node.done{color:var(--text-secondary)}
.ap-node.done::before{background:var(--success);border-color:var(--success)}
.ap-node.active{color:var(--text-primary);font-weight:500}
.ap-node.active::before{background:currentColor;border-color:currentColor;box-shadow:0 0 4px currentColor}
.ap-node-icon{font-size:10px;width:14px;text-align:center;flex-shrink:0}

/* System Event */
.system-event{text-align:center;font-size:12px;color:var(--text-muted);padding:6px 0}
.system-event span{
  display:inline-block;padding:4px 12px;background:var(--bg-secondary);
  border:1px solid var(--border);border-radius:20px;
}

/* Input */
.input-area{
  padding:14px 20px;border-top:1px solid var(--border);background:var(--bg-primary);
  display:flex;gap:10px;align-items:flex-end;
}
.input-area textarea{
  flex:1;resize:none;background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;color:var(--text-primary);
  font-family:var(--font);font-size:13.5px;line-height:1.5;
  min-height:44px;max-height:160px;outline:none;transition:border-color var(--transition);
}
.input-area textarea:focus{border-color:var(--supervisor)}
.input-area textarea::placeholder{color:var(--text-muted)}
.btn-send{
  width:44px;height:44px;border-radius:var(--radius);border:none;
  background:var(--supervisor);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);flex-shrink:0;
}
.btn-send:hover{filter:brightness(1.15)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.btn-send svg{width:18px;height:18px}

/* Loading indicator */
.thinking-indicator{
  display:flex;align-items:center;gap:8px;padding:8px 0;align-self:flex-start;
  color:var(--text-secondary);font-size:12.5px;
}
.thinking-dots{display:flex;gap:3px}
.thinking-dots span{
  width:5px;height:5px;border-radius:50%;background:var(--text-muted);
  animation:bounce 1.2s infinite;
}
.thinking-dots span:nth-child(2){animation-delay:.15s}
.thinking-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-4px);opacity:1}}

/* ── Detail Panel ──────────────────────────────────────────────────────── */
.detail-panel{
  background:var(--bg-secondary);border-left:1px solid var(--border);
  height:100vh;overflow-y:auto;padding:16px;
}
.detail-panel.hidden{display:none}
.panel-section{margin-bottom:20px}
.panel-section-title{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.panel-section-title svg{width:14px;height:14px;opacity:.6}

/* Workflow Timeline */
.timeline{position:relative;padding-left:20px}
.timeline::before{
  content:'';position:absolute;left:7px;top:4px;bottom:4px;
  width:2px;background:var(--border);border-radius:1px;
}
.timeline-node{position:relative;padding:0 0 16px 16px}
.timeline-node:last-child{padding-bottom:0}
.timeline-dot{
  position:absolute;left:-17px;top:3px;
  width:12px;height:12px;border-radius:50%;border:2px solid var(--border);
  background:var(--bg-secondary);
}
.timeline-dot.agent-supervisor{background:var(--supervisor);border-color:var(--supervisor)}
.timeline-dot.agent-researcher{background:var(--researcher);border-color:var(--researcher)}
.timeline-dot.agent-analyst{background:var(--analyst);border-color:var(--analyst)}
.timeline-dot.agent-coder{background:var(--coder);border-color:var(--coder)}
.timeline-dot.agent-reviewer{background:var(--reviewer);border-color:var(--reviewer)}
.timeline-dot.agent-tool_executor{background:var(--tool);border-color:var(--tool)}
.timeline-dot.done{box-shadow:0 0 6px currentColor}
.timeline-dot.failed{background:var(--error);border-color:var(--error)}
.timeline-node-title{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.timeline-node-task{font-size:11.5px;color:var(--text-secondary);margin-top:2px;line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.timeline-node-meta{display:flex;gap:6px;margin-top:3px;align-items:center}
.timeline-score{
  font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:10px;
}
.timeline-score.s5{background:rgba(16,185,129,.15);color:var(--score-5)}
.timeline-score.s4{background:rgba(52,211,153,.15);color:var(--score-4)}
.timeline-score.s3{background:rgba(245,158,11,.15);color:var(--score-3)}
.timeline-score.s2{background:rgba(249,115,22,.15);color:var(--score-2)}
.timeline-score.s1{background:rgba(239,68,68,.15);color:var(--score-1)}
.timeline-status{font-size:11px}
.timeline-status.done{color:var(--success)}
.timeline-status.failed{color:var(--error)}

/* No data placeholder */
.empty-state{text-align:center;padding:24px 12px;color:var(--text-muted);font-size:12.5px;line-height:1.6}

/* Reflection tags */
.insight-tag{
  display:block;padding:8px 12px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);
  border-radius:var(--radius-sm);font-size:12px;color:var(--text-secondary);
  margin-bottom:6px;line-height:1.5;
}

/* State summary cards */
.state-card{
  padding:8px 12px;background:var(--bg-tertiary);border-radius:var(--radius-sm);
  font-size:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;
}
.state-card-label{color:var(--text-muted);font-size:11px}
.state-card-value{font-weight:600;font-size:12px}
.warning-banner{
  padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  border-radius:var(--radius-sm);font-size:12px;color:var(--error);
  display:flex;align-items:center;gap:8px;
}

/* Note banner */
.note-banner{
  padding:8px 14px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);
  border-radius:var(--radius-sm);font-size:11.5px;color:var(--info);margin-bottom:12px;
}

/* ── Responsive ────────────────────────────────────────────────────────── */
@media(max-width:1400px){
  #app{grid-template-columns:240px 1fr 320px}
}
@media(max-width:1100px){
  #app{grid-template-columns:240px 1fr}
  .detail-panel{display:none}
  .detail-panel.overlay{
    display:block;position:fixed;right:0;top:0;z-index:100;width:340px;
    box-shadow:-4px 0 20px rgba(0,0,0,.4);
  }
}
@media(max-width:700px){
  #app{grid-template-columns:1fr}
  .sidebar{display:none}
  .sidebar.overlay{
    display:flex;position:fixed;left:0;top:0;z-index:100;width:260px;
    box-shadow:4px 0 20px rgba(0,0,0,.4);
  }
  .message{max-width:95%}
}
</style>
</head>
<body>

<div id="app">
  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">A</div>
      <span class="sidebar-title">Agent Hub</span>
      <span class="sidebar-status" title="Connected"></span>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new" onclick="handleNewSession()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Session
      </button>
    </div>
    <div class="sessions-list" id="sessions-list"></div>
  </aside>

  <!-- ── Chat Panel ───────────────────────────────────────────────────── -->
  <main class="chat-panel">
    <div class="chat-header">
      <span class="session-label" id="chat-title">Select a session</span>
      <span class="badge badge-simple" id="intent-badge" style="display:none">Simple</span>
      <span class="badge badge-complex" id="intent-badge-complex" style="display:none">Complex</span>
      <span class="badge badge-iterations" id="iter-badge" style="display:none">0/15</span>
      <button class="btn-toggle-detail" onclick="toggleDetailPanel()" title="Toggle detail panel">☰ Details</button>
    </div>

    <div class="messages-container" id="messages-container">
      <div class="empty-state" id="welcome-msg">
        <div style="font-size:40px;margin-bottom:12px;opacity:.6">⚡</div>
        <div style="font-weight:600;font-size:15px;margin-bottom:4px">Multi-Agent System Ready</div>
        <div>Supervisor → Researcher / Coder / Analyst / Reviewer</div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="user-input" rows="1" placeholder="输入消息，Enter 发送 / Shift+Enter 换行..."
        onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btn-send" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </main>

  <!-- ── Detail Panel ──────────────────────────────────────────────────── -->
  <aside class="detail-panel" id="detail-panel">
    <div class="note-banner" style="display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">&#9432;</span> Send a message to see agent workflow.
    </div>

    <div class="panel-section" id="section-timeline">
      <div class="panel-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Workflow Timeline
      </div>
      <div class="timeline" id="timeline"></div>
    </div>

    <div class="panel-section" id="section-scores">
      <div class="panel-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Reviewer Scores
      </div>
      <div id="scores-list"></div>
    </div>

    <div class="panel-section" id="section-insights">
      <div class="panel-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Reflection Insights
      </div>
      <div id="insights-list"></div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">State Summary</div>
      <div class="state-card"><span class="state-card-label">Intent</span><span class="state-card-value" id="state-intent">—</span></div>
      <div class="state-card"><span class="state-card-label">Iterations</span><span class="state-card-value" id="state-iterations">—</span></div>
      <div class="state-card"><span class="state-card-label">Current Agent</span><span class="state-card-value" id="state-agent">—</span></div>
      <div id="human-approval-warning" style="display:none"></div>
    </div>
  </aside>
</div>

<script>
/* ── Store ─────────────────────────────────────────────────────────────── */
const store = {
  currentThreadId: null,
  sessions: [],
  messages: [],
  completedTasks: [],
  pendingTasks: [],
  reflectionInsights: [],
  intent: '',
  iterationCount: 0,
  currentAgent: '',
  needHumanApproval: false,
  isLoading: false,
  detailOpen: true,
};

/* ── API ───────────────────────────────────────────────────────────────── */
const api = {
  async chat(message, threadId) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, thread_id: threadId }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || err.error || 'Request failed');
    }
    return res.json();
  },

  async getSessions() {
    const res = await fetch('/api/sessions');
    return res.json();
  },

  async getSession(threadId) {
    const res = await fetch(`/api/sessions/${encodeURIComponent(threadId)}`);
    if (!res.ok) throw new Error('Session not found');
    return res.json();
  },

  async deleteSession(threadId) {
    const res = await fetch(`/api/sessions/${encodeURIComponent(threadId)}`, { method: 'DELETE' });
    return res.json();
  },
};

/* ── Render Functions ──────────────────────────────────────────────────── */
const AGENT_NAMES = {
  supervisor: 'Supervisor', researcher: 'Researcher', analyst: 'Analyst',
  coder: 'Coder', reviewer: 'Reviewer', tool_executor: 'Tool',
};

const AGENT_ICONS = {
  supervisor: 'S', researcher: 'R', analyst: 'A', coder: 'C', reviewer: 'V', tool_executor: 'T',
};

function agentColorClass(name) {
  const map = { supervisor:'supervisor', researcher:'researcher', analyst:'analyst',
    coder:'coder', reviewer:'reviewer', tool_executor:'tool_executor' };
  return `agent-${map[name] || 'tool_executor'}`;
}

function renderSessions() {
  const el = document.getElementById('sessions-list');
  el.innerHTML = store.sessions.length === 0
    ? '<div class="empty-state">No sessions yet.<br>Send a message to start.</div>'
    : store.sessions.map(s => {
        const isActive = s.thread_id === store.currentThreadId;
        return `<div class="session-item${isActive ? ' active' : ''}"
                    onclick="selectSession('${escHtml(s.thread_id)}')">
          <div class="session-info">
            <div class="session-name">${escHtml(s.thread_id)}</div>
            <div class="session-meta">${s.message_count || 0} messages</div>
          </div>
          <button class="btn-delete-session" onclick="event.stopPropagation();deleteSession('${escHtml(s.thread_id)}')"
                  title="Delete">×</button>
        </div>`;
      }).join('');
}

function renderMessages() {
  const container = document.getElementById('messages-container');
  const welcome = document.getElementById('welcome-msg');
  if (welcome) welcome.style.display = store.messages.length > 0 ? 'none' : '';

  const existing = container.querySelectorAll('.message,.tool-card,.system-event,.thinking-indicator,.agent-progress:not(.completed)');
  existing.forEach(e => e.remove());

  store.messages.forEach((m, i) => {
    const el = renderOneMessage(m, i);
    if (el) container.appendChild(el);
  });

  container.scrollTop = container.scrollHeight;
}

function isSupervisorJson(content) {
  // 过滤掉 supervisor 的意图分类/进度检查 JSON，不渲染
  if (!content || !content.trim().startsWith('{')) return false;
  const s = content.trim();
  return (s.includes('"intent"') && s.includes('"route"')) ||
         (s.includes('"action"') && s.includes('"reason"'));
}

function isTypewriterCandidate(msg) {
  // 非 JSON、超过 80 字的 AI 回复做打字机动画
  if (msg.role !== 'ai') return false;
  const c = (msg.content || '').trim();
  return c.length > 80 && !c.startsWith('{');
}

function renderOneMessage(msg, idx) {
  const div = document.createElement('div');

  if (msg.role === 'user') {
    div.className = 'message user';
    div.innerHTML = `<div class="msg-avatar user-avatar">U</div>
      <div class="msg-bubble"><div class="msg-content">${escHtml(msg.content)}</div></div>`;
    return div;
  }

  if (msg.role === 'ai') {
    // 跳过 supervisor 决策 JSON
    if (isSupervisorJson(msg.content)) return null;

    const agent = msg.agent || '';
    const agentClass = agent ? agentColorClass(agent) : '';
    const label = agent ? AGENT_NAMES[agent] || agent : 'Agent';
    const content = msg.content || '';

    div.className = 'message agent';
    if (agent) div.setAttribute('data-agent', agent);
    // 标记为可打字机动画
    if (isTypewriterCandidate(msg)) div.setAttribute('data-typewriter', '');
    div.innerHTML = `<div class="msg-avatar ${agentClass}">${AGENT_ICONS[agent] || 'A'}</div>
      <div class="msg-bubble">
        ${label ? `<div class="msg-agent-label" style="color:var(--${agentClass.replace('agent-','') || 'text-secondary'})">${label}</div>` : ''}
        <div class="msg-content">${formatContent(content)}</div>
      </div>`;
    return div;
  }

  if (msg.role === 'tool') {
    div.className = 'tool-card';
    const isError = msg.content.toLowerCase().includes('error');
    div.innerHTML = `<div class="tool-card-header" data-action="toggle-tool">
      <div class="tool-card-icon">⚙</div>
      <span class="tool-card-name">${escHtml(msg.tool_name || 'tool')}</span>
      <span class="tool-status ${isError ? 'error' : 'success'}">${isError ? '✗ Error' : '✓ Done'}</span>
      <span class="tool-card-chevron">▾</span>
    </div>
    <div class="tool-card-body">
      <div class="tool-card-section">
        <div class="tool-card-section-label">Output</div>
        <pre>${escHtml(truncate(msg.content, 2000))}</pre>
      </div>
    </div>`;
    return div;
  }

  if (msg.role === 'system') {
    div.className = 'system-event';
    div.innerHTML = `<span>${escHtml(msg.content)}</span>`;
    return div;
  }

  return null;
}

function formatContent(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Bold markdown
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  return html;
}

function renderTimeline() {
  const el = document.getElementById('timeline');
  if (store.completedTasks.length === 0) {
    el.innerHTML = '<div class="empty-state">Run a complex task to see workflow</div>';
    return;
  }
  el.innerHTML = store.completedTasks.map(t => {
    const cls = agentColorClass(t.agent);
    const label = AGENT_NAMES[t.agent] || t.agent;
    const statusCls = t.status === 'done' ? 'done' : (t.status === 'failed' ? 'failed' : '');
    const statusIcon = t.status === 'done' ? '✓' : (t.status === 'failed' ? '✗' : '⋯');
    const score = t.review_score;
    return `<div class="timeline-node">
      <div class="timeline-dot ${cls} ${statusCls}"></div>
      <div class="timeline-node-title">
        <span style="color:var(--${cls.replace('agent-','')})">${label}</span>
      </div>
      <div class="timeline-node-task" title="${escHtml(t.task || '')}">${escHtml(t.task || 'No description')}</div>
      <div class="timeline-node-meta">
        <span class="timeline-status ${statusCls}">${statusIcon} ${t.status || ''}</span>
        ${score != null ? `<span class="timeline-score s${score}">Score: ${score}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderScores() {
  const el = document.getElementById('scores-list');
  const tasksWithScores = store.completedTasks.filter(t => t.review_score != null);
  if (tasksWithScores.length === 0) {
    el.innerHTML = '<div class="empty-state">No reviews yet</div>';
    return;
  }
  el.innerHTML = tasksWithScores.map(t => {
    const score = t.review_score;
    const passed = t.review_pass;
    return `<div class="state-card" style="flex-direction:column;align-items:flex-start;gap:4px">
      <div style="display:flex;justify-content:space-between;width:100%;align-items:center">
        <span style="font-weight:600;font-size:12px">${escHtml(AGENT_NAMES[t.agent] || t.agent)}: ${escHtml((t.task || '').slice(0, 40))}</span>
        <span class="timeline-score s${score}" style="font-size:12px">Score: ${score}</span>
      </div>
      <span style="font-size:11px;color:${passed ? 'var(--success)' : 'var(--error)'}">${passed ? '✓ Passed' : '✗ Failed'}</span>
    </div>`;
  }).join('');
}

function renderInsights() {
  const el = document.getElementById('insights-list');
  if (!store.reflectionInsights || store.reflectionInsights.length === 0) {
    el.innerHTML = '<div class="empty-state">No insights yet</div>';
    return;
  }
  el.innerHTML = store.reflectionInsights.map(i =>
    `<div class="insight-tag">&#128161; ${escHtml(String(i))}</div>`
  ).join('');
}

function renderHeader() {
  document.getElementById('chat-title').textContent = store.currentThreadId || 'New Session';
  document.getElementById('intent-badge').style.display = store.intent === 'simple' ? '' : 'none';
  document.getElementById('intent-badge-complex').style.display = store.intent === 'complex' ? '' : 'none';
  const iterBadge = document.getElementById('iter-badge');
  iterBadge.style.display = store.iterationCount > 0 ? '' : 'none';
  iterBadge.textContent = `${store.iterationCount}/15`;
}

function renderStateSummary() {
  document.getElementById('state-intent').textContent = store.intent || '—';
  document.getElementById('state-iterations').textContent = store.iterationCount || '—';
  document.getElementById('state-agent').textContent = store.currentAgent || '—';
  const warn = document.getElementById('human-approval-warning');
  if (store.needHumanApproval) {
    warn.style.display = '';
    warn.className = 'warning-banner';
    warn.innerHTML = '&#9888; Human approval required';
  } else {
    warn.style.display = 'none';
  }
}

function renderAll() {
  renderSessions();
  renderMessages();
  renderTimeline();
  renderScores();
  renderInsights();
  renderHeader();
  renderStateSummary();
}

/* ── Helpers ───────────────────────────────────────────────────────────── */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function truncate(s, n) { return String(s).length > n ? String(s).slice(0, n) + '\n... (truncated)' : s; }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

function showThinking(agentName) {
  const container = document.getElementById('messages-container');
  const div = document.createElement('div');
  div.className = 'thinking-indicator';
  div.id = 'thinking-indicator';
  div.innerHTML = `<span>${agentName ? escHtml(agentName) + ' thinking' : 'Thinking'}</span>
    <div class="thinking-dots"><span></span><span></span><span></span></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function removeThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
}

/* ── Agent Progress Bar ────────────────────────────────────────────────── */
const AP_STEP_NAMES = {
  supervisor:'Supervisor', researcher:'Researcher', analyst:'Analyst',
  coder:'Coder', reviewer:'Reviewer', tool_executor:'Tool',
};

function addProgressBar() {
  removeProgressBar();
  const container = document.getElementById('messages-container');
  const div = document.createElement('div');
  div.className = 'agent-progress';
  div.id = 'agent-progress-bar';
  div.innerHTML = `<div class="ap-header" onclick="toggleAgentProgress()">
    <span class="ap-dot" id="ap-dot"></span>
    <span class="ap-label"><span class="ap-step" id="ap-step">Starting...</span></span>
    <span class="ap-chevron" id="ap-chevron">▸</span>
  </div>
  <div class="ap-body">
    <div class="ap-timeline" id="ap-timeline"></div>
  </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeProgressBar() {
  const el = document.getElementById('agent-progress-bar');
  if (el) el.remove();
}

function completeProgressBar() {
  const bar = document.getElementById('agent-progress-bar');
  if (!bar) return;
  bar.classList.add('completed');
  // 标记所有节点为完成
  bar.querySelectorAll('.ap-node').forEach(n => {
    n.classList.remove('active', 'pending');
    n.classList.add('done');
    const icon = n.querySelector('.ap-node-icon');
    if (icon) icon.textContent = '✓';
  });
  const dot = document.getElementById('ap-dot');
  if (dot) { dot.classList.remove('active'); dot.style.background = 'var(--success)'; }
  document.getElementById('ap-step').textContent = 'All tasks completed ✓';
  bar.classList.remove('expanded');
}

function startTypewriter() {
  const candidates = document.querySelectorAll('[data-typewriter]');
  if (candidates.length === 0) return;
  // 只动画最后一条（最终回复）
  const el = candidates[candidates.length - 1];
  const contentDiv = el.querySelector('.msg-content');
  if (!contentDiv) return;
  const fullHtml = contentDiv.innerHTML;
  const fullText = contentDiv.textContent || '';
  // 超过 500 字不逐字
  if (fullText.length > 500) return;
  contentDiv.innerHTML = '';
  el.removeAttribute('data-typewriter');

  let i = 0;
  const chars = [...fullHtml];  // 按码点拆分
  const speed = Math.max(15, Math.min(40, fullText.length > 200 ? 10 : 25));
  const timer = setInterval(() => {
    if (i >= chars.length) {
      clearInterval(timer);
      contentDiv.innerHTML = fullHtml;
      document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
      return;
    }
    i = Math.min(i + 2, chars.length);  // 每次 2 字符，视觉更流畅
    contentDiv.innerHTML = chars.slice(0, i).join('');
    document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
  }, speed);
  // 存储 timer 以便新消息到达时取消
  contentDiv._typewriterTimer = timer;
}

function stopTypewriters() {
  document.querySelectorAll('.msg-content').forEach(el => {
    if (el._typewriterTimer) { clearInterval(el._typewriterTimer); el._typewriterTimer = null; }
  });
}

function toggleAgentProgress() {
  const bar = document.getElementById('agent-progress-bar');
  if (bar) bar.classList.toggle('expanded');
}

function updateProgressFromAgent(agent) {
  var bar = document.getElementById('agent-progress-bar');
  if (!bar) return;
  var label = AP_STEP_NAMES[agent] || agent;
  var dot = document.getElementById('ap-dot');
  dot.className = 'ap-dot active';
  var colorMap = { supervisor:'supervisor', researcher:'researcher', analyst:'analyst', coder:'coder', reviewer:'reviewer', tool_executor:'tool' };
  dot.style.background = 'var(--' + (colorMap[agent] || 'tool') + ')';
  document.getElementById('ap-step').textContent = label + ' generating...';
}

/* ── Live token accumulator ──────────────────────────────────────────────── */
const live = {
  agent: '',
  bubble: null,
  content: '',
};

function flushLiveBubble() {
  if (!live.bubble || !live.content.trim()) {
    live.agent = ''; live.bubble = null; live.content = '';
    return;
  }
  live.bubble.querySelector('.msg-content').innerHTML = formatContent(live.content);
  live.bubble.removeAttribute('data-live');
  live.agent = ''; live.bubble = null; live.content = '';
}

function getOrCreateLiveBubble(agent) {
  if (live.agent === agent && live.bubble) return live.bubble;
  flushLiveBubble();
  const container = document.getElementById('messages-container');
  const div = document.createElement('div');
  const label = AGENT_NAMES[agent] || agent;
  const cls = agentColorClass(agent);
  div.className = 'message agent';
  div.setAttribute('data-agent', agent);
  div.setAttribute('data-live', 'true');
  div.innerHTML = '<div class="msg-avatar ' + cls + '">' + (AGENT_ICONS[agent] || 'A') + '</div>' +
    '<div class="msg-bubble">' +
    '<div class="msg-agent-label" style="color:var(--' + cls.replace('agent-','') + ')">' + label + '</div>' +
    '<div class="msg-content"></div>' +
    '</div>';
  container.appendChild(div);
  live.agent = agent;
  live.bubble = div;
  live.content = '';
  return div;
}

function createToolCardLive(name) {
  flushLiveBubble();
  const container = document.getElementById('messages-container');
  const div = document.createElement('div');
  div.className = 'tool-card expanded';
  div.setAttribute('data-live-tool', name);
  div.innerHTML = '<div class="tool-card-header" data-action="toggle-tool">' +
    '<div class="tool-card-icon">⚙</div>' +
    '<span class="tool-card-name">' + escHtml(name) + '</span>' +
    '<span class="tool-status" style="color:var(--warning)">⏳ Running...</span>' +
    '<span class="tool-card-chevron">▾</span>' +
    '</div>' +
    '<div class="tool-card-body">' +
    '<div class="tool-card-section"><div class="tool-card-section-label">Output</div>' +
    '<pre class="live-tool-output">...</pre></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function updateToolCardLive(name, output) {
  document.querySelectorAll('[data-live-tool="' + name + '"]').forEach(function(card) {
    card.removeAttribute('data-live-tool');
    var isError = (output || '').toLowerCase().indexOf('error') >= 0;
    var st = card.querySelector('.tool-status');
    st.textContent = isError ? '✗ Error' : '✓ Done';
    st.style.color = isError ? 'var(--error)' : 'var(--success)';
    var pre = card.querySelector('.live-tool-output');
    if (pre) pre.textContent = truncate(output, 2000);
  });
}

/* ── Handlers ──────────────────────────────────────────────────────────── */
async function handleSend() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || store.isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  store.isLoading = true;
  stopTypewriters();
  flushLiveBubble();

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="32" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle></svg>';

  store.messages.push({ role: 'user', content: text });
  renderMessages();
  addProgressBar();

  try {
    const response = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: store.currentThreadId || null }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.detail || 'Stream failed');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try { handleStreamEvent(JSON.parse(line.slice(6))); } catch (e) {}
        }
      }
    }
  } catch (err) {
    flushLiveBubble();
    removeProgressBar();
    store.messages.push({ role: 'ai', content: 'Error: ' + err.message, agent: '' });
    store.completedTasks.push({ agent: 'tool_executor', task: text, result: 'Error: ' + err.message, status: 'failed' });
    renderAll();
  } finally {
    store.isLoading = false;
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
    input.focus();
  }
}

function handleStreamEvent(event) {
  var etype = event.event;

  if (etype === 'agent_start') {
    updateProgressFromAgent(event.agent);
    getOrCreateLiveBubble(event.agent);

  } else if (etype === 'token') {
    // supervisor 输出的是 JSON 决策，不实时渲染
    if (event.agent === 'supervisor') return;
    if (!live.bubble) getOrCreateLiveBubble(event.agent || '');
    live.content += event.token;
    var cd = live.bubble.querySelector('.msg-content');
    if (cd) {
      cd.innerHTML = formatContent(live.content);
      document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
    }

  } else if (etype === 'tool_start') {
    createToolCardLive(event.tool);

  } else if (etype === 'tool_end') {
    updateToolCardLive(event.tool, event.output);

  } else if (etype === 'complete') {
    flushLiveBubble();
    completeProgressBar();
    var state = event.state;
    store.messages = state.messages || [];
    store.completedTasks = state.completed_tasks || [];
    store.pendingTasks = state.pending_tasks || [];
    store.reflectionInsights = state.reflection_insights || [];
    store.intent = state.intent || '';
    store.iterationCount = state.iteration_count || 0;
    store.currentAgent = state.current_agent || '';
    store.needHumanApproval = state.need_human_approval || false;

    if (!store.currentThreadId) {
      store.currentThreadId = state.thread_id;
      localStorage.setItem('currentThreadId', state.thread_id);
    }

    api.getSessions().then(function(d) { store.sessions = d.sessions || []; renderSessions(); });
    // Remove live elements, replace with final rendered messages
    var liveEls = document.querySelectorAll('[data-live]');
    for (var i = 0; i < liveEls.length; i++) liveEls[i].remove();
    var liveTools = document.querySelectorAll('[data-live-tool]');
    for (var j = 0; j < liveTools.length; j++) liveTools[j].remove();
    renderMessages();
    startTypewriter();
    renderTimeline();
    renderScores();
    renderInsights();
    renderHeader();
    renderStateSummary();

  } else if (etype === 'error') {
    flushLiveBubble();
    removeProgressBar();
    store.messages.push({ role: 'ai', content: 'Error: ' + event.error, agent: '' });
    renderMessages();
  }
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

async function selectSession(threadId) {
  store.currentThreadId = threadId;
  localStorage.setItem('currentThreadId', threadId);
  try {
    const data = await api.getSession(threadId);
    store.messages = data.messages || [];
    store.completedTasks = data.completed_tasks || [];
    store.pendingTasks = data.pending_tasks || [];
    store.reflectionInsights = data.reflection_insights || [];
    store.intent = data.intent || '';
    store.iterationCount = data.iteration_count || 0;
    store.currentAgent = data.current_agent || '';
    store.needHumanApproval = data.need_human_approval || false;
    const sessionsData = await api.getSessions();
    store.sessions = sessionsData.sessions || [];
    renderAll();
  } catch (err) {
    console.error('Failed to load session:', err);
  }
}

async function deleteSession(threadId) {
  if (!confirm(`Delete session "${threadId}"?`)) return;
  await api.deleteSession(threadId);
  if (store.currentThreadId === threadId) {
    store.currentThreadId = null;
    localStorage.removeItem('currentThreadId');
    store.messages = [];
    store.completedTasks = [];
    store.pendingTasks = [];
    store.reflectionInsights = [];
    store.intent = '';
    store.iterationCount = 0;
    store.currentAgent = '';
    store.needHumanApproval = false;
  }
  const sessionsData = await api.getSessions();
  store.sessions = sessionsData.sessions || [];
  renderAll();
}

function handleNewSession() {
  store.currentThreadId = null;
  localStorage.removeItem('currentThreadId');
  store.messages = [];
  store.completedTasks = [];
  store.pendingTasks = [];
  store.reflectionInsights = [];
  store.intent = '';
  store.iterationCount = 0;
  store.currentAgent = '';
  store.needHumanApproval = false;
  renderAll();
  document.getElementById('user-input').focus();
}

function toggleDetailPanel() {
  const panel = document.getElementById('detail-panel');
  store.detailOpen = !store.detailOpen;
  if (window.innerWidth <= 1100) {
    panel.classList.toggle('overlay', store.detailOpen);
  } else {
    panel.classList.toggle('hidden', !store.detailOpen);
  }
  // Update grid
  const app = document.getElementById('app');
  if (window.innerWidth > 1100) {
    app.style.gridTemplateColumns = store.detailOpen ? '260px 1fr 380px' : '260px 1fr';
  }
}

document.getElementById('messages-container').addEventListener('click', function(e) {
  const header = e.target.closest('[data-action="toggle-tool"]');
  if (header) {
    const card = header.closest('.tool-card');
    if (card) card.classList.toggle('expanded');
  }
});

/* ── Init ──────────────────────────────────────────────────────────────── */
async function init() {
  try {
    const data = await api.getSessions();
    store.sessions = data.sessions || [];
  } catch {}

  const saved = localStorage.getItem('currentThreadId');
  if (saved) {
    try {
      await selectSession(saved);
    } catch {
      store.currentThreadId = null;
    }
  }

  renderAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
